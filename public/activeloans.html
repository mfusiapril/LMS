<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.6);
            border-radius: 999px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen bg-slate-100">
        <div class="grid min-h-screen grid-cols-1 lg:grid-cols-[280px_1fr]">
            <aside
                class="sidebar hidden overflow-y-auto border-r border-slate-200 bg-slate-950 px-6 py-8 text-slate-100 lg:block">
                <div class="mb-10">
                    <div
                        class="mb-4 inline-flex items-center gap-3 rounded-3xl bg-slate-900 px-4 py-3 text-sm font-semibold shadow-lg shadow-slate-950/20">
                        <span
                            class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-emerald-400 text-slate-950">C</span>
                        <div>
                            <p class="text-xs uppercase tracking-[0.35em] text-slate-400">CreditFlow</p>
                            <p class="mt-1 text-base font-semibold">Admin Suite</p>
                        </div>
                    </div>
                    <p class="text-sm text-slate-400">Loan management suite for tracking active loans and payments.</p>
                </div>

                <nav class="space-y-1">
                    <a href="manage.html"
                        class="flex items-center gap-3 rounded-3xl bg-slate-800 px-4 py-4 text-sm font-semibold text-white shadow-sm shadow-slate-950/10">
                        <span>🏠</span>
                        <span>Dashboard</span>
                    </a>
                    <a href="activeloans.html"
                        class="flex items-center gap-3 rounded-3xl px-4 py-4 text-sm font-semibold text-slate-300 transition hover:bg-slate-800 hover:text-white">
                        <span>📋</span>
                        <span>Active Loans</span>
                    </a>
                    <a href="paidLoans.html"
                        class="flex items-center gap-3 rounded-3xl px-4 py-4 text-sm font-semibold text-slate-300 transition hover:bg-slate-800 hover:text-white">
                        <span>💵</span>
                        <span>Payments</span>
                    </a>
                </nav>

                <div class="mt-12 rounded-3xl bg-white p-5 text-slate-900 shadow-xl shadow-slate-950/10">
                    <p class="text-sm font-semibold text-slate-600">Export Data</p>
                    <p class="mt-3 text-sm text-slate-500">Download loan reports and payment history.</p>
                    <button
                        class="mt-4 w-full rounded-3xl bg-emerald-500 px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400">Export</button>
                </div>
            </aside>


            <div class="mt-4 overflow-x-auto">
                <section class="mt-6 rounded-[32px] bg-white p-6 shadow-[0_18px_40px_rgba(15,23,42,0.08)]">
                    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                            <p class="text-sm uppercase tracking-[0.35em] text-slate-500">Recent activity</p>
                            <h2 class="mt-3 text-2xl font-semibold text-slate-950">Transactions for the month</h2>
                        </div>
                        <div class="flex items-center gap-3">
                            <input type="date" id="filterDate"
                                class="hidden rounded-full border border-slate-200 px-4 py-2 text-sm text-slate-700 focus:border-slate-400 focus:outline-none" />
                            <button id="filterBtn"
                                class="rounded-full bg-slate-950 px-5 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">Filter</button>
                        </div>
                    </div>
                </section>

                <table id="manage-loans-table" class="min-w-full text-left text-sm text-slate-600">
                    <thead class="border-b border-slate-200 text-slate-500">
                        <tr>
                            <th class="px-4 py-4">Client</th>
                            <th class="px-4 py-4">Borrowed</th>
                            <th class="px-4 py-4">Interest (35%)</th>
                            <th class="px-4 py-4">Total Due</th>
                            <th class="px-4 py-4">Status</th>
                            <th class="px-4 py-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="manage-loans-body"
                        class="divide-y divide-slate-200 [&>tr:nth-child(odd)]:bg-gray-300 [&>tr:nth-child(even)]:bg-gray-100">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="scripts/manage.js"></script>
    <script src="scripts/dataFilter.js"></script>
</body>

</html>
